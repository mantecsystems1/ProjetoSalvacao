services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biblia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biblia_dev}
      POSTGRES_DB: ${POSTGRES_DB:-biblia_online}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key_change_me}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    command: ["meilisearch", "--http-addr", "0.0.0.0:7700"]

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-biblia_online};Username=${POSTGRES_USER:-biblia};Password=${POSTGRES_PASSWORD:-biblia_dev}
      Jwt__Issuer: ${JWT_ISSUER:-biblia-online}
      Jwt__Audience: ${JWT_AUDIENCE:-biblia-online-clients}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?defina JWT_SIGNING_KEY com pelo menos 32 caracteres}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-10080}
      Meilisearch__Url: http://meilisearch:7700
      Meilisearch__ApiKey: ${MEILI_MASTER_KEY:-dev_master_key_change_me}
      Meilisearch__VersesIndex: ${MEILI_INDEX:-verses}
      Meilisearch__SyncOnStartup: ${MEILI_SYNC_ON_STARTUP:-true}
      Cors__Origins__0: ${PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  meili_data:
