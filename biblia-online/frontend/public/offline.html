<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="Você está offline. Abra seus capítulos salvos, favoritos ou volte para a página inicial." />
    <title>Offline · Biblia Online</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1220;
        color: #f8fafc;
        font-family: system-ui, sans-serif;
        text-align: center;
      }
      .container {
        max-width: 520px;
        padding: 2rem;
      }
      a {
        color: #fff;
        text-decoration: none;
        border: 1px solid rgba(255,255,255,.22);
        border-radius: 999px;
        padding: 0.85rem 1.5rem;
        display: inline-block;
        margin-top: 1rem;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1rem;
        padding: 0.6rem 1rem;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: #e2e8f0;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Você está offline</h1>
      <p>O aplicativo continua funcionando com o conteúdo já acessado. Visite seus capítulos recentes ou favoritos para continuar lendo.</p>
      <p class="badge">Modo offline ativado</p>
      <div>
        <a href="/">Página inicial</a>
        <br />
        <a href="/favoritos">Favoritos offline</a>
      </div>
    </div>
  </body>
</html>
