name: Deploy Biblia Online

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, prod]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # =====================================
      # LOGIN DOCKER HUB
      # =====================================
      - name: Login Docker Hub
        working-directory: ./biblia-online
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USER }}" \
          --password-stdin

      # =====================================
      # BUILD API
      # =====================================
      - name: Build API
        working-directory: ./biblia-online
        run: |
          docker build \
            -f docker/backend.Dockerfile \
            -t ${{ secrets.DOCKER_USER }}/biblia-api:latest \
            .

      # =====================================
      # PUSH API
      # =====================================
      - name: Push API
        working-directory: ./biblia-online
        run: |
          docker push ${{ secrets.DOCKER_USER }}/biblia-api:latest

      # =====================================
      # BUILD WEB
      # =====================================
      - name: Build WEB
        working-directory: ./biblia-online
        run: |
          docker build \
            -f docker/frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=https://biblia.portalmantec.com.br \
            --build-arg NEXT_PUBLIC_SITE_URL=https://biblia.portalmantec.com.br \
            -t ${{ secrets.DOCKER_USER }}/biblia-web:latest \
            .

      # =====================================
      # PUSH WEB
      # =====================================
      - name: Push WEB
        working-directory: ./biblia-online
        run: |
          docker push ${{ secrets.DOCKER_USER }}/biblia-web:latest

      # =====================================
      # DEPLOY STACK
      # =====================================
      - name: Deploy Stack
        run: |

          docker pull ${{ secrets.DOCKER_USER }}/biblia-api:latest

          docker pull ${{ secrets.DOCKER_USER }}/biblia-web:latest

          cd ~/stacks/05-apps/biblia

          docker stack deploy \
            --with-registry-auth \
            --env-file .env \
            -c biblia.yml \
            biblia